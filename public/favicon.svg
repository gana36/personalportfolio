<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #121212; }
      .braces {
        font-size: 62px;
        font-family: monospace;
        font-weight: bold;
        text-anchor: middle;
        dominant-baseline: central;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%   { fill: #2E5BFF; opacity: 1; }
        50%  { fill: #A8E6CF; opacity: 0.7; }
        100% { fill: #2E5BFF; opacity: 1; }
      }
    </style>
  </defs>
  <rect width="100" height="100" rx="20" class="bg"/>
  <text x="50" y="52" class="braces">{}</text>
</svg>
